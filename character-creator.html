<style>
/* ============================================================
   RESET & ROOT — shared design tokens
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  background: #050808;
  color: rgba(244,228,193,0.92);
  font-family: 'Crimson Text', 'Noto Serif SC', serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
  user-select: none;
}

:root {
  --void: #050808;
  --gold: #c9a84c;
  --gold-bright: #e8c84c;
  --gold-dim: #7a6530;
  --gold-mist: rgba(201,168,76,0.06);
  --teal: #3a7a6a;
  --text-1: rgba(244,228,193,0.92);
  --text-2: rgba(244,228,193,0.58);
  --text-3: rgba(244,228,193,0.30);
  --transition-main: 1.1s cubic-bezier(0.22, 0.61, 0.36, 1);
  --transition-slow: 1.6s cubic-bezier(0.22, 0.61, 0.36, 1);
  --transition-carousel: 0.75s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* ============================================================
   METALLIC GOLD TEXT
   ============================================================ */
.gold-text {
  background: linear-gradient(170deg,
    #7a6530 0%, #c9a84c 25%, #f0d060 45%,
    #c9a84c 55%, #7a6530 75%, #c9a84c 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 8s ease-in-out infinite;
  filter: drop-shadow(0 2px 8px rgba(201,168,76,0.3));
}
@keyframes shimmer {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* ============================================================
   BACKGROUND LAYERS
   ============================================================ */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover;
  background-position: center 40%;
  transition: opacity var(--transition-slow);
}
#bg-default {
  opacity: 1;
  background-color: #0a1210;
}
#bg-default img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 40%;
  animation: bg-breathe 25s ease-in-out infinite alternate;
}
@keyframes bg-breathe {
  0%   { transform: scale(1.0); }
  50%  { transform: scale(1.04); }
  100% { transform: scale(1.01); }
}
#bg-race {
  opacity: 0;
  background-color: #0a1210;
}
#bg-race img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 40%;
  animation: bg-breathe 25s ease-in-out infinite alternate;
}
/* Class selection pantheon background */
#bg-class {
  opacity: 0;
  background-color: #0a1210;
}
#bg-class img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 45%;
  animation: bg-breathe 28s ease-in-out infinite alternate;
}

/* Vignette overlay */
.vignette {
  position: fixed; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse 85% 75% at 50% 45%, transparent 20%, rgba(5,8,8,0.55) 65%, rgba(5,8,8,0.92) 100%);
  pointer-events: none;
  transition: background var(--transition-slow);
}
body.state-b .vignette {
  background:
    radial-gradient(ellipse 90% 80% at 60% 45%, transparent 15%, rgba(5,8,8,0.50) 55%, rgba(5,8,8,0.88) 100%);
}

/* Atmospheric fog */
.fog {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none; opacity: 0;
  animation: fog-move linear infinite;
}
.fog-1 {
  background: radial-gradient(ellipse 70% 35% at 25% 75%, rgba(201,168,76,0.035) 0%, transparent 70%);
  animation-duration: 20s;
}
.fog-2 {
  background: radial-gradient(ellipse 55% 30% at 70% 60%, rgba(58,122,106,0.04) 0%, transparent 70%);
  animation-duration: 28s; animation-delay: -8s;
}
@keyframes fog-move {
  0%   { opacity: 0; transform: translateX(-6%); }
  20%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(6%) scale(1.05); }
}

/* Top & bottom atmosphere (used by class step) */
.atmosphere {
  position: fixed; inset: 0; z-index: 1;
  background:
    linear-gradient(to bottom, rgba(5,8,8,0.6) 0%, transparent 18%),
    linear-gradient(to top, rgba(5,8,8,0.75) 0%, rgba(5,8,8,0.3) 10%, transparent 28%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s;
}

/* ============================================================
   PARTICLE CANVAS — shared
   ============================================================ */
#particle-canvas {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
}

/* ============================================================
   GLOBAL NAV BAR — classical progress indicator
   ============================================================ */
.global-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  padding: 22px 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.nav-progress {
  display: flex;
  align-items: center;
  gap: 0;
  font-family: 'Cinzel', serif;
  font-size: clamp(0.6rem, 0.9vw, 0.78rem);
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.nav-step {
  color: var(--text-3);
  transition: color 0.8s, text-shadow 0.8s;
  cursor: default;
  white-space: nowrap;
}
.nav-step.active {
  color: var(--gold);
  text-shadow: 0 0 12px rgba(201,168,76,0.25);
}
.nav-step.done {
  color: var(--gold-dim);
  cursor: pointer;
  pointer-events: auto;
}
.nav-step.done:hover {
  color: var(--gold);
  text-shadow: 0 0 10px rgba(201,168,76,0.2);
}
.nav-separator {
  display: inline-block;
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, rgba(201,168,76,0.08), rgba(201,168,76,0.2), rgba(201,168,76,0.08));
  margin: 0 16px;
  vertical-align: middle;
}

/* ============================================================
   STEP SECTIONS — visibility control
   ============================================================ */
.step-section {
  position: fixed; inset: 0;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
  transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1),
              visibility 0s 0.8s;          /* delay visibility:hidden until fade-out ends */
}
.step-section.visible {
  opacity: 1;
  pointer-events: auto;
  visibility: visible;
  transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1),
              visibility 0s 0s;            /* visibility flips immediately on show */
}

/* Cross-step transition overlay */
.step-transition-overlay {
  position: fixed; inset: 0;
  z-index: 500;
  background: var(--void);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s cubic-bezier(0.22,0.61,0.36,1);
}
.step-transition-overlay.active {
  opacity: 1;
}

/* ============================================================
   STEP 1: RACE SELECTION — State A (Gallery)
   ============================================================ */
.race-gallery {
  position: absolute; inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(24px, 4vw, 64px);
  padding: 0 8vw;
  transition: opacity 0.6s;
}
body.state-b .race-gallery { pointer-events: none; }

/* Individual race card */
.race-card {
  position: relative;
  flex: 0 0 auto;
  width: clamp(180px, 18vw, 280px);
  cursor: pointer;
  transition:
    opacity var(--transition-main),
    transform var(--transition-main),
    filter var(--transition-main);
  will-change: transform, opacity;
}
.race-card.dismissed {
  opacity: 0 !important;
  transform: scale(0.85) translateY(20px) !important;
  pointer-events: none;
  transition-duration: 0.7s;
}

/* Portrait wrapper — 1:2 ratio */
.portrait-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 2;
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 8px 40px rgba(0,0,0,0.6),
    0 0 0 1px rgba(201,168,76,0.08);
  transition: box-shadow 0.5s, transform 0.5s cubic-bezier(0.22,0.61,0.36,1);
}
.race-card:hover .portrait-wrap {
  box-shadow:
    0 12px 48px rgba(0,0,0,0.7),
    0 0 0 1px rgba(201,168,76,0.2),
    0 0 40px rgba(201,168,76,0.08);
  transform: translateY(-6px) scale(1.02);
}

.portrait-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 15%;
  transition: transform 0.6s cubic-bezier(0.22,0.61,0.36,1), filter 0.6s;
}
.race-card:hover .portrait-wrap img {
  transform: scale(1.05);
}

/* Hover glow overlay */
.portrait-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%,
    rgba(201,168,76,0.12) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
.race-card:hover .portrait-glow { opacity: 1; }

/* Bottom gradient for text */
.portrait-gradient {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(to top, rgba(5,8,8,0.9) 0%, rgba(5,8,8,0.4) 50%, transparent 100%);
  pointer-events: none;
}

/* Race name label */
.race-name {
  position: absolute; bottom: 16px; left: 0; right: 0;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: clamp(0.85rem, 1.3vw, 1.1rem);
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--text-1);
  text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  transition: opacity 0.4s;
}
.race-name-sub {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem;
  font-weight: 400;
  letter-spacing: 0.18em;
  color: var(--text-3);
  margin-top: 2px;
}

/* Breathing glow ring on hover */
@keyframes ring-breathe {
  0%,100% { box-shadow: 0 0 0 1px rgba(201,168,76,0.1), inset 0 0 30px rgba(201,168,76,0.02); }
  50% { box-shadow: 0 0 0 1.5px rgba(201,168,76,0.25), inset 0 0 40px rgba(201,168,76,0.06); }
}
.race-card:hover .portrait-wrap {
  animation: ring-breathe 3s ease-in-out infinite;
}

/* ============================================================
   STEP 1: State B — SELECTED VIEW
   ============================================================ */

/* Left anchor portrait */
.selected-portrait {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 28vw;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transform: translateX(-10%);
  transition:
    opacity var(--transition-main),
    transform var(--transition-main);
}
body.state-b .selected-portrait {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}
.selected-portrait img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 15%;
}
.selected-portrait-gradient {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 50%;
  background: linear-gradient(to left, rgba(5,8,8,0.95), transparent);
  pointer-events: none;
}
.selected-portrait-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 25%;
  background: linear-gradient(to top, rgba(5,8,8,0.8), transparent);
  pointer-events: none;
}

/* ============================================================
   INFO PANEL (right side, state B)
   ============================================================ */
.info-panel {
  position: fixed;
  top: 0; bottom: 0;
  left: 28vw; right: 0;
  z-index: 20;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6vh 5vw 6vh 4vw;
  opacity: 0;
  transform: translateX(30px);
  pointer-events: none;
  transition:
    opacity 0.9s cubic-bezier(0.22,0.61,0.36,1) 0.35s,
    transform 0.9s cubic-bezier(0.22,0.61,0.36,1) 0.35s;
}
body.state-b .info-panel {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

/* Translucent card — no blur */
.info-card {
  background: rgba(5,8,8,0.55);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 16px;
  padding: clamp(28px, 3.5vh, 48px) clamp(28px, 3vw, 48px);
  max-height: 82vh;
  overflow-y: auto;
  box-shadow:
    0 16px 48px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(201,168,76,0.06);
  scrollbar-width: thin;
  scrollbar-color: rgba(201,168,76,0.15) transparent;
}
.info-card::-webkit-scrollbar { width: 4px; }
.info-card::-webkit-scrollbar-track { background: transparent; }
.info-card::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.15); border-radius: 2px; }

.info-card::before {
  content: '';
  position: absolute;
  top: -1px; left: 15%; right: 15%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
}

/* Race title in panel */
.info-race-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 3vw, 2.8rem);
  font-weight: 600;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.info-race-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.8rem, 1.1vw, 1rem);
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 24px;
}

.info-divider {
  width: 80px; height: 1px;
  background: linear-gradient(90deg, var(--gold-dim), transparent);
  margin: 20px 0;
}

.info-lore {
  font-family: 'Crimson Text', 'Noto Serif SC', serif;
  font-size: clamp(0.95rem, 1.1vw, 1.05rem);
  line-height: 1.85;
  color: var(--text-1);
  text-shadow: 0 1px 6px rgba(0,0,0,0.7);
  margin-bottom: 28px;
  max-width: 620px;
}
.info-lore em {
  color: var(--text-1);
  font-style: italic;
}

/* Stat grid */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.stat-item {
  background: rgba(5,8,8,0.25);
  border: 1px solid rgba(201,168,76,0.1);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
  transition: border-color 0.4s, background 0.4s;
}
.stat-item:hover {
  border-color: rgba(201,168,76,0.2);
  background: rgba(201,168,76,0.06);
}
.stat-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 6px;
}
.stat-value {
  font-family: 'Cinzel', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--gold);
}

/* Traits */
.traits-section { margin-bottom: 28px; }
.traits-title {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text-2);
  margin-bottom: 14px;
}
.trait-row {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 12px;
}
.trait-icon {
  flex: 0 0 auto;
  width: 28px; height: 28px;
  border-radius: 6px;
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  color: var(--gold-dim);
}
.trait-text {
  font-family: 'Crimson Text', 'Noto Serif SC', serif;
  font-size: 0.92rem;
  line-height: 1.6;
  color: var(--text-1);
  text-shadow: 0 1px 5px rgba(0,0,0,0.6);
}
.trait-text strong {
  color: var(--text-1);
  font-weight: 600;
}

/* ============================================================
   RACE BACK BUTTON
   ============================================================ */
.back-btn {
  position: fixed;
  bottom: 36px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s 0.5s, transform 0.7s 0.5s cubic-bezier(0.22,0.61,0.36,1);
  display: flex; align-items: center; gap: 10px;
  padding: 12px 32px;
  background: rgba(5,8,8,0.32);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 100px;
  cursor: pointer;
  color: var(--text-2);
  font-family: 'Cinzel', serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.back-btn:hover {
  border-color: rgba(201,168,76,0.35);
  color: var(--text-1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(201,168,76,0.08);
}
.back-btn svg {
  width: 14px; height: 14px;
  stroke: currentColor; fill: none; stroke-width: 1.5;
  transition: transform 0.3s;
}
.back-btn:hover svg { transform: translateX(-3px); }
body.state-b .back-btn {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

/* Confirm button */
.confirm-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 36px;
  background: linear-gradient(145deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 10px;
  cursor: pointer;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: all 0.4s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.confirm-btn:hover {
  background: linear-gradient(145deg, rgba(201,168,76,0.25), rgba(201,168,76,0.12));
  border-color: rgba(201,168,76,0.5);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 30px rgba(201,168,76,0.1);
  transform: translateY(-1px);
}
.confirm-btn svg {
  width: 16px; height: 16px;
  stroke: currentColor; fill: none; stroke-width: 1.5;
}

/* ============================================================
   STEP 2: CLASS SELECTION — 3D CAROUSEL
   ============================================================ */
.carousel-stage {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  perspective: 1200px;
  perspective-origin: 50% 48%;
}

.carousel-ring {
  position: relative;
  width: 0; height: 0;
  transform-style: preserve-3d;
  transform-origin: 0 0;
  transition: transform var(--transition-carousel);
}

/* Orbital anchor — zero-size; ONLY rotateY + translateZ */
.class-card {
  position: absolute;
  left: 0; top: 0;
  width: 0; height: 0;
  transform-style: preserve-3d;
  cursor: pointer;
  transition:
    filter var(--transition-carousel),
    opacity var(--transition-carousel);
}

/* Visual card — independent centering */
.card-inner {
  position: absolute;
  width: clamp(190px, 17vw, 270px);
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
}

/* Portrait frame — 1:2 */
.card-portrait {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 2;
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 10px 50px rgba(0,0,0,0.65),
    0 0 0 1px rgba(201,168,76,0.06);
  transition: box-shadow 0.5s, transform 0.5s cubic-bezier(0.22,0.61,0.36,1);
}
.card-portrait img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 15%;
  display: block;
}

/* Active glow overlay */
.card-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%,
    rgba(201,168,76,0.10) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.6s;
  pointer-events: none;
}

/* Active card state */
.class-card.active .card-portrait {
  box-shadow:
    0 15px 60px rgba(0,0,0,0.7),
    0 0 0 1px rgba(201,168,76,0.15),
    0 0 50px rgba(201,168,76,0.06);
}
.class-card.active .card-glow { opacity: 1; }

/* Non-active: darken */
.class-card:not(.active) { filter: brightness(0.55); }
.class-card.active { filter: brightness(1); }

/* ============================================================
   BOTTOM SCRIM — class step
   ============================================================ */
.bottom-scrim {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 28vh;

  width: 16px; height: 16px;

  bottom: clamp(100px, 14vh, 150px);

.nav-right { right: clamp(16px, 3vw, 40px); }

  bottom: 12px; left: 50%;

  text-transform: uppercase;

  position: absolute;
  bottom: 32px; left: 50%;
  transform: translateX(-50%);

  text-align: center;
  transition: opacity 0.6s;

body.state-b .gallery-hint { opacity: 0; pointer-events: none; }
.gallery-hint span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-3);
  animation: hint-breathe 3s ease-in-out infinite;
}

/* ============================================================
   ENTRANCE ANIMATIONS
   ============================================================ */
@keyframes fade-rise {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.race-card { animation: fade-rise 0.9s cubic-bezier(0.22,0.61,0.36,1) both; }
.race-card:nth-child(1) { animation-delay: 0.15s; }
.race-card:nth-child(2) { animation-delay: 0.30s; }
.race-card:nth-child(3) { animation-delay: 0.45s; }

@keyframes fade-rise-light {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-enter { animation: fade-rise-light 1s cubic-bezier(0.25,0.8,0.25,1) both; }
.anim-d1 { animation-delay: 0.2s; }
.anim-d2 { animation-delay: 0.5s; }
.anim-d3 { animation-delay: 0.8s; }

@keyframes hint-breathe {
  0%,100% { opacity: 0.35; }
  50% { opacity: 0.7; }
}

/* ============================================================
   LOADING CURTAIN
   ============================================================ */
.loading-curtain {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--void);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px;
  transition: opacity 1.2s cubic-bezier(0.22,0.61,0.36,1);
}
.loading-curtain.lifted {
  opacity: 0;
  pointer-events: none;
}
.loading-crest {
  width: 48px; height: 48px;
  color: var(--gold-dim);
  animation: crest-pulse 2.5s ease-in-out infinite;
}
@keyframes crest-pulse {
  0%,100% { opacity: 0.4; transform: scale(1); filter: drop-shadow(0 0 8px rgba(201,168,76,0.15)); }
  50% { opacity: 0.9; transform: scale(1.06); filter: drop-shadow(0 0 20px rgba(201,168,76,0.35)); }
}
.loading-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-3);
  animation: hint-breathe 2s ease-in-out infinite;
}
.loading-bar-track {
  width: 180px; height: 1px;
  background: rgba(201,168,76,0.1);
  border-radius: 1px;
  overflow: hidden;
}
.loading-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.3s ease-out;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

    id: 'druid',
    name: 'Druid',
    nameCN: '德鲁伊',
    tagline: '自然意志的化身，聆听万物低语的原初之声。',
    portrait: '职业选择/职业立绘/德鲁伊/druid4.png',
  },
];

const CLASS_COUNT = CLASSES.length;
const ANGLE_STEP = 360 / CLASS_COUNT;
const CAROUSEL_RADIUS = Math.max(380, window.innerWidth * 0.32);

/* ============================================================
   RACE SELECTION STATE MACHINE
   ============================================================ */
let raceState = 'A';
let selectedRace = null;

function selectRace(raceId) {
  if (raceState === 'B' || isStepTransitioning) return;
  raceState = 'transitioning';
  selectedRace = raceId;
  const race = RACES[raceId];

  // 1. Dismiss all cards
  document.querySelectorAll('.race-card').forEach(card => {
    card.classList.add('dismissed');
  });

  // 2. Preload city bg
  document.getElementById('bg-race-img').src = race.cityBg;

  // 3. Set selected portrait
  document.getElementById('selectedPortraitImg').src = race.portrait;

  // 4. Populate info panel
  populateInfoPanel(race);

  // 5. After cards fade out, swap backgrounds and enter state B
  setTimeout(() => {
    document.getElementById('bg-default').style.opacity = '0';
    document.getElementById('bg-race').style.opacity = '1';
    document.body.classList.add('state-b');
    raceState = 'B';
  }, 550);
}

function goBack() {
  if (raceState !== 'B' || isStepTransitioning) return;
  raceState = 'transitioning';

  document.body.classList.remove('state-b');
  document.getElementById('bg-default').style.opacity = '1';
  document.getElementById('bg-race').style.opacity = '0';

  setTimeout(() => {
    const cards = document.querySelectorAll('.race-card');

    cards.forEach(card => {
      card.style.animation = 'none';
      card.style.transition = 'none';
      card.style.opacity = '0';
      card.style.transform = 'translateY(22px) scale(0.96)';
      card.classList.remove('dismissed');
    });

    void cards[0].offsetHeight;

    cards.forEach((card, i) => {
      const delay = i * 0.13;
      card.style.transition =
        `opacity 1s cubic-bezier(0.22,0.61,0.36,1) ${delay}s, ` +
        `transform 1s cubic-bezier(0.22,0.61,0.36,1) ${delay}s`;
      card.style.opacity = '1';
      card.style.transform = 'translateY(0) scale(1)';
    });

    setTimeout(() => {
      cards.forEach(card => {
        card.style.transition = '';
        card.style.opacity = '';
        card.style.transform = '';
      });
    }, 1500);

    raceState = 'A';
    selectedRace = null;
    characterState.race = null;
  }, 900);
}

function populateInfoPanel(race) {
  const card = document.getElementById('infoCard');
  card.innerHTML = `
    <div class="info-race-title gold-text">${race.name}</div>
    <div class="info-race-subtitle">${race.subtitle}</div>
    <div class="info-divider"></div>
    <div class="info-lore">${race.lore}</div>
    <div class="stat-grid">
      ${race.stats.map(s => `
        <div class="stat-item">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value">${s.value}</div>
        </div>
      `).join('')}
    </div>
    <div class="traits-section">
      <div class="traits-title">Racial Traits · 种族特性</div>
      ${race.traits.map(t => `
        <div class="trait-row">
          <div class="trait-icon">${t.icon}</div>
          <div class="trait-text"><strong>${t.name}</strong> — ${t.desc}</div>
        </div>
      `).join('')}
    </div>
    <div class="info-divider" style="margin-top:8px;"></div>
    <button class="confirm-btn" onclick="confirmRaceAndProceed()">
      <span>Confirm Selection</span>
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  `;
}

/* ============================================================
   STEP TRANSITIONS
   ============================================================ */
function confirmRaceAndProceed() {
  if (isStepTransitioning || !selectedRace) return;
  characterState.race = selectedRace;
  transitionToStep(2);
}

function confirmClass() {
  if (isStepTransitioning) return;
  characterState.class = CLASSES[currentClassIndex].id;
  // Future: transition to step 3
  alert(`角色创建完成！\n种族: ${RACES[characterState.race].nameCN}\n职业: ${CLASSES[currentClassIndex].nameCN}\n\n（后续步骤待实现）`);
}

function goBackToRace() {
  if (isStepTransitioning) return;
  characterState.class = null;
  transitionToStep(1);
}

function transitionToStep(targetStep) {
  if (isStepTransitioning || targetStep === currentStep) return;
  isStepTransitioning = true;

  const overlay = document.getElementById('stepOverlay');
  const fromSection = document.getElementById(currentStep === 1 ? 'step-race' : 'step-class');
  const toSection = document.getElementById(targetStep === 1 ? 'step-race' : 'step-class');

  // Immediately kill pointer events on source to prevent ghost clicks
  fromSection.style.pointerEvents = 'none';

  // Phase 1: Fade to black
  overlay.style.transition = 'opacity 0.6s cubic-bezier(0.22,0.61,0.36,1)';
  overlay.classList.add('active');

  setTimeout(() => {
    // At peak darkness: switch sections
    fromSection.classList.remove('visible');
    fromSection.style.pointerEvents = '';       // reset inline override
    toSection.classList.add('visible');

    // Switch backgrounds
    if (targetStep === 2) {
      // Going to class selection
      document.getElementById('bg-default').style.opacity = '0';
      document.getElementById('bg-race').style.opacity = '0';
      document.getElementById('bg-class').style.opacity = '1';
      document.getElementById('atmosphere').style.opacity = '1';

      // Reset race state-b visuals
      document.body.classList.remove('state-b');

      // Init carousel if first time
      if (!carouselInitialized) initCarousel();

      // Reset carousel to first class
      resetCarouselView();
    } else {
      // Going back to race selection
      document.getElementById('bg-class').style.opacity = '0';
      document.getElementById('atmosphere').style.opacity = '0';

      // Restore race state B (since we confirmed a race)
      if (characterState.race) {
        const race = RACES[characterState.race];
        document.getElementById('bg-race-img').src = race.cityBg;
        document.getElementById('selectedPortraitImg').src = race.portrait;
        populateInfoPanel(race);
        document.getElementById('bg-default').style.opacity = '0';
        document.getElementById('bg-race').style.opacity = '1';
        selectedRace = characterState.race;
        raceState = 'B';
        document.body.classList.add('state-b');
      }
    }

    // Update nav
    updateGlobalNav(targetStep);
    currentStep = targetStep;

    // Phase 2: Fade from black (after a brief hold)
    setTimeout(() => {
      overlay.style.transition = 'opacity 0.8s cubic-bezier(0.22,0.61,0.36,1)';
      overlay.classList.remove('active');

      setTimeout(() => {
        isStepTransitioning = false;
      }, 800);
    }, 200);
  }, 600);
}

function updateGlobalNav(step) {
  const s1 = document.getElementById('navStep1');
  const s2 = document.getElementById('navStep2');

  s1.className = 'nav-step';
  s2.className = 'nav-step';

  if (step === 1) {
    s1.classList.add('active');
  } else if (step === 2) {
    s1.classList.add('done');
    s2.classList.add('active');
  }
}

// Allow clicking on "done" nav steps to go back
document.getElementById('navStep1').addEventListener('click', function() {
  if (this.classList.contains('done')) {
    goBackToRace();
  }
});

/* ============================================================
   CLASS CAROUSEL
   ============================================================ */
let currentClassIndex = 0;
let isCarouselAnimating = false;
let carouselInitialized = false;

function initCarousel() {
  const ring = document.getElementById('carouselRing');
  ring.innerHTML = '';

  CLASSES.forEach((cls, i) => {
    const card = document.createElement('div');
    card.className = 'class-card';
    card.dataset.index = i;
    const angle = i * ANGLE_STEP;
    card.style.transform = `rotateY(${angle}deg) translateZ(${CAROUSEL_RADIUS}px)`;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-portrait">
          <img src="${cls.portrait}" alt="${cls.name}" loading="eager">
          <div class="card-glow"></div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => rotateTo(i));
    ring.appendChild(card);
  });

  ring.dataset.rotation = 0;
  updateCarouselActiveStates();
  updateCarouselInfo();
  carouselInitialized = true;
}

function resetCarouselView() {
  const ring = document.getElementById('carouselRing');
  currentClassIndex = 0;
  ring.dataset.rotation = 0;
  ring.style.transition = 'none';
  ring.style.transform = 'rotateY(0deg)';
  void ring.offsetHeight;
  ring.style.transition = '';
  updateCarouselActiveStates();
  updateCarouselInfo();
}

function rotateTo(index) {
  if (isCarouselAnimating || isStepTransitioning) return;

  const ring = document.getElementById('carouselRing');
  const n = ((index % CLASS_COUNT) + CLASS_COUNT) % CLASS_COUNT;

  let diff = n - currentClassIndex;
  if (diff > CLASS_COUNT / 2) diff -= CLASS_COUNT;
  if (diff < -CLASS_COUNT / 2) diff += CLASS_COUNT;

  currentClassIndex = n;

  const currentRotation = parseFloat(ring.dataset.rotation || 0);
  const newRotation = currentRotation - diff * ANGLE_STEP;
  ring.dataset.rotation = newRotation;
  ring.style.transform = `rotateY(${newRotation}deg)`;

  updateCarouselActiveStates();
  updateCarouselInfo();

  isCarouselAnimating = true;
  setTimeout(() => { isCarouselAnimating = false; }, 750);
}

function updateCarouselActiveStates() {
  document.querySelectorAll('.class-card').forEach((card, i) => {
    card.classList.toggle('active', i === currentClassIndex);
  });
}

function updateCarouselInfo() {
  const cls = CLASSES[currentClassIndex];
  const nameEl = document.getElementById('activeInfoName');
  const tagEl = document.getElementById('activeInfoTagline');
  const info = document.getElementById('activeInfo');

  info.style.opacity = '0';
  setTimeout(() => {
    nameEl.textContent = cls.name;
    tagEl.textContent = cls.tagline;
    info.style.opacity = '1';
  }, 250);
}

/* ============================================================
   KEYBOARD CONTROLS
   ============================================================ */
document.addEventListener('keydown', (e) => {
  if (isStepTransitioning) return;

  // Only handle carousel keys when class step is visible
  if (currentStep === 2) {
    if (isCarouselAnimating) return;
    if (e.key === 'ArrowLeft')  rotateTo(currentClassIndex - 1);
    if (e.key === 'ArrowRight') rotateTo(currentClassIndex + 1);
  }
});

/* ============================================================
   PARTICLE SYSTEM (shared Canvas)
   ============================================================ */
(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  const PARTICLE_COUNT = 80;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = Math.random() * W;
      this.y = initial ? Math.random() * H : H + 10;
      this.size = 0.8 + Math.random() * 2.5;
      this.speedY = -(0.15 + Math.random() * 0.6);
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.sway = Math.random() * Math.PI * 2;
      this.swaySpeed = 0.005 + Math.random() * 0.015;
      this.swayAmp = 15 + Math.random() * 25;
      this.maxOpacity = 0.2 + Math.random() * 0.55;
      this.opacity = initial ? Math.random() * this.maxOpacity : 0;
      this.fadeIn = !initial;
      const r = 200 + Math.random() * 55;
      const g = 160 + Math.random() * 70;
      const b = 40 + Math.random() * 40;
      this.color = `${r},${g},${b}`;
      this.glowSize = this.size * (2 + Math.random() * 3);
      this.isSparkle = Math.random() > 0.75;
      if (this.isSparkle) {
        this.sparklePhase = Math.random() * Math.PI * 2;
        this.sparkleSpeed = 0.03 + Math.random() * 0.05;
        this.speedY *= 0.3;
        this.color = '255,245,220';
        this.maxOpacity = 0.15 + Math.random() * 0.35;
      }
    }
    update() {
      this.sway += this.swaySpeed;
      this.x += this.speedX + Math.sin(this.sway) * 0.3;
      this.y += this.speedY;
      if (this.fadeIn) {
        this.opacity = Math.min(this.opacity + 0.005, this.maxOpacity);
        if (this.opacity >= this.maxOpacity) this.fadeIn = false;
      }
      if (this.y < H * 0.15) this.opacity *= 0.995;
      if (this.isSparkle) {
        this.sparklePhase += this.sparkleSpeed;
        this.opacity = this.maxOpacity * (0.3 + 0.7 * Math.abs(Math.sin(this.sparklePhase)));
      }
      if (this.y < -20 || this.opacity < 0.01) this.reset(false);
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity * 0.4;
      ctx.fillStyle = `rgba(${this.color},1)`;
      ctx.shadowColor = `rgba(${this.color},0.6)`;
      ctx.shadowBlur = this.glowSize;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = this.opacity;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

  function animate() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
})();

/* ============================================================
   IMAGE PRELOADER
   ============================================================ */
(function() {
  const curtain = document.getElementById('loadingCurtain');
  const bar = document.getElementById('loadingBar');

  // Critical: race step images (visible first)
  const criticalSrcs = [
    'Shimmersive_Epic_fantasy_game_main_menu_background_thick_impast_3aa475d0-88f1-4362-8e5e-7395fcda171b.png',
    '种族立绘/高等精灵/Shimmersive_A_full-body_character_concept_art_sheet_of_a_High_a0177ec5-2819-437e-aff7-8db8fbec1014_3.png',
    '种族立绘/人类/Shimmersive_A_full-body_character_concept_art_sheet_of_a_Huma_ea3cb5f7-7713-463c-980e-a1cdd7329357_2.png',
    '种族立绘/矮人/Shimmersive_A_full-body_character_concept_art_sheet_of_a_Dwar_85e8ffc0-7a63-44f3-98d0-5aee2739db6e_2.png',
  ];

  // Prefetch: city bgs + class images (non-blocking)
  const prefetchSrcs = [
    '主城概念图/高等精灵/Shimmersive_Epic_fantasy_concept_art_thick_impasto_oil_painti_60e9b3cc-a18b-4b8a-95e6-0984b340d487_2.png',
    '主城概念图/人类/Shimmersive_Classical_romanticism_oil_painting_of_a_sprawling_ef993ee1-4d6e-4cd3-a423-59363912001c_2.png',
    '主城概念图/矮人/Shimmersive_A_massive_underground_forge_deep_within_the_Iron__e674909c-6426-40d2-be48-b83f82dc0450_3.png',
    '职业选择/背景/万神殿.png',
    '职业选择/职业立绘/战士/warrior1.png',
    '职业选择/职业立绘/法师/soccer2.png',
    '职业选择/职业立绘/牧师/Priest.png',
    '职业选择/职业立绘/盗贼/rogue.png',
    '职业选择/职业立绘/德鲁伊/druid4.png',
  ];

  let loaded = 0;
  const total = criticalSrcs.length;

  function onLoad() {
    loaded++;
    bar.style.width = Math.round((loaded / total) * 100) + '%';
    if (loaded >= total) liftCurtain();
  }

  function liftCurtain() {
    setTimeout(() => {
      curtain.classList.add('lifted');
      setTimeout(() => curtain.remove(), 1400);
    }, 300);

    // Start prefetching remaining assets
    prefetchSrcs.forEach(src => {
      const img = new Image();
      img.src = src;
    });
  }

  criticalSrcs.forEach(src => {
    const img = new Image();
    img.onload = onLoad;
    img.onerror = onLoad;
    img.src = src;
  });

  // Safety net
  setTimeout(() => {
    if (!curtain.classList.contains('lifted')) liftCurtain();
  }, 12000);
})();
</script>
